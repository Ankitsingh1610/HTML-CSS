<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>range</title>
</head>
<body>
    <form action="server">
        <div>
            <label for="volume"> volume range</label>
            <input type="range"min="0" max="100"name="volume"step="5"value="70">
            <button>submit</button>
        </div>
          
    </form>
</body>
</html>
