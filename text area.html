<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <form action="server">
        <div>
            <label for="feedback">Give me your valuable feedback :</label>
            <textarea

             id="feedbck"

            <button>submit</button>
        </div>
    </form>
</body>
</html>
